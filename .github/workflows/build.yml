name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build F-Droid Debug APK
        run: ./gradlew assembleFdroidDebug --no-daemon
      
      - name: Upload F-Droid Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fdroid-debug
          path: app/build/outputs/apk/fdroid/debug/app-fdroid-debug.apk
          retention-days: 30
      
      - name: Build F-Droid Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleFdroidRelease --no-daemon
      
      - name: Upload F-Droid Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: app-fdroid-release
          path: app/build/outputs/apk/fdroid/release/app-fdroid-release.apk
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/fdroid/release/app-fdroid-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
